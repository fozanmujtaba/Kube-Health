# =============================================================================
# postgres-secret.yaml — Stores PostgreSQL credentials as a K8s Secret
# =============================================================================
# Secrets store sensitive data (passwords, tokens) in base64-encoded form.
# They are mounted as env vars in the postgres container. In production,
# you'd use something like Vault or sealed-secrets; base64 is NOT encryption,
# it's just encoding. For this demo it's sufficient.
#
# Encoded values (use `echo -n 'value' | base64` to verify):
#   hospital_admin   → aG9zcGl0YWxfYWRtaW4=
#   er_secure_pass   → ZXJfc2VjdXJlX3Bhc3M=
#   hospital_db      → aG9zcGl0YWxfZGI=
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: kube-health
  labels:
    app: kube-health
    component: database
# Opaque is the default secret type for arbitrary key-value pairs.
type: Opaque
data:
  # Base64-encoded PostgreSQL superuser name
  POSTGRES_USER: aG9zcGl0YWxfYWRtaW4=
  # Base64-encoded password — change this for any real deployment
  POSTGRES_PASSWORD: ZXJfc2VjdXJlX3Bhc3M=
  # Base64-encoded database name that will be auto-created on first boot
  POSTGRES_DB: aG9zcGl0YWxfZGI=
