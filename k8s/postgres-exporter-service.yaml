# =============================================================================
# postgres-exporter-service.yaml — Service for postgres-exporter
# =============================================================================
# Provides a stable DNS endpoint for Prometheus to scrape postgres-exporter.
# Prometheus targets this service by DNS name rather than individual pod IPs.
#
# DNS: postgres-exporter-service.kube-health.svc.cluster.local:9187
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter-service
  namespace: kube-health
  labels:
    app: kube-health
    component: postgres-exporter
spec:
  type: ClusterIP
  selector:
    app: kube-health
    component: postgres-exporter
  ports:
    - name: metrics
      protocol: TCP
      port: 9187          # Service port
      targetPort: 9187    # Container port on the exporter
