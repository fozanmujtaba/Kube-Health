# =============================================================================
# postgres-exporter-deployment.yaml — Exports PostgreSQL metrics to Prometheus
# =============================================================================
# postgres-exporter is a sidecar-style service that connects to PostgreSQL,
# runs diagnostic SQL queries, and exposes the results as Prometheus metrics
# on an HTTP endpoint (port 9187).
#
# Key metrics it exposes:
#   - pg_stat_activity_count : Number of active database connections
#     (This is our primary ER load proxy — more connections = more patients)
#   - pg_locks_count         : Number of database locks held
#   - pg_up                  : Whether PostgreSQL is reachable (1 or 0)
#   - pg_stat_database_*     : Per-database statistics (transactions, etc.)
#
# The HPA (Phase 3) and Dashboard both rely on these metrics flowing
# through Prometheus, so this exporter is a critical link in the pipeline.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: kube-health
  labels:
    app: kube-health
    component: monitoring
    tier: exporter
spec:
  # Single replica is sufficient — this is a stateless metrics proxy.
  replicas: 1

  selector:
    matchLabels:
      app: kube-health
      component: postgres-exporter

  template:
    metadata:
      labels:
        app: kube-health
        component: postgres-exporter
      # Annotations that tell Prometheus to auto-discover and scrape this pod.
      # If using Prometheus service discovery (kubernetes_sd_config), these
      # annotations are picked up automatically.
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.15.0
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 9187
              protocol: TCP
              name: metrics

          env:
            # DATA_SOURCE_NAME is the PostgreSQL connection string.
            # Format: postgresql://user:password@host:port/database?sslmode=disable
            # Uses the K8s DNS name of the postgres service for discovery.
            - name: DATA_SOURCE_NAME
              value: "postgresql://hospital_admin:er_secure_pass@postgres-service.kube-health.svc.cluster.local:5432/hospital_db?sslmode=disable"

            # Disable SSL since we're in a cluster-internal network.
            - name: PG_EXPORTER_DISABLE_DEFAULT_METRICS
              value: "false"

            # Extend the default timeout for slow queries during high load.
            - name: PG_EXPORTER_QUERY_TIMEOUT
              value: "30"

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"

          # Readiness probe: checks if the exporter's /metrics endpoint is up.
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9187
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5

          # Liveness probe: restarts the exporter if it becomes unresponsive.
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9187
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
